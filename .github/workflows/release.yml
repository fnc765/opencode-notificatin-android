name: Build and Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Bump version
        run: |
          bash scripts/bump-version.sh
          git add app/build.gradle.kts
          git diff --staged --quiet || git commit -m "chore: auto bump version [skip ci]"
          git push origin HEAD:${GITHUB_REF#refs/heads/}

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -oP '"[0-9.]+"' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION"

      - name: Build APK
        run: docker build -t opencode-notifier .

      - name: Extract APK
        run: |
          docker run --rm --entrypoint cat opencode-notifier /opencode-notifier-release.apk > opencode-notifier.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-notifier-${{ steps.version.outputs.version }}
          path: opencode-notifier.apk

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"

          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" opencode-notifier.apk \
            --title "$TAG" \
            --draft \
            --generate-notes
