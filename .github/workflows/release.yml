name: Build and Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - auto (date-based)
        default: 'auto (date-based)'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Bump version (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          bash scripts/bump-version.sh
          git add app/build.gradle.kts
          git commit -m "chore: bump version [skip ci]" || true

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -oP '"[0-9.]+"' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION"

      - name: Build APK
        run: docker build -t opencode-notifier .

      - name: Extract APK
        run: |
          docker run --rm --entrypoint cat opencode-notifier /opencode-notifier-release.apk > opencode-notifier.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-notifier-${{ steps.version.outputs.version }}
          path: opencode-notifier.apk

      - name: Create tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create/Update Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: opencode-notifier.apk
